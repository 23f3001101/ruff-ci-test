name: ruff-ci
on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: pip install ruff==0.4.4
      - name: Run Ruff Check
        run: ruff check .
      - name: Run Ruff Format
        run: ruff format --check .
